{% extends "base.html" %}
{% block content %}

<h1>🔐 Password Generator</h1>

<input type="number" id="length" placeholder="Password Length">

<div class="options">
    <label><input type="checkbox" id="upper"> Uppercase</label>
    <label><input type="checkbox" id="lower"> Lowercase</label>
    <label><input type="checkbox" id="digits"> Numbers</label>
    <label><input type="checkbox" id="symbols"> Symbols</label>
</div>

<input type="text" id="exclude" placeholder="Exclude characters">

<button onclick="generatePassword()">Generate</button>
<button onclick="copyPassword()">Copy</button>

<div class="result">
    <p id="password"></p>
    <p id="entropy"></p>
    <p id="strength"></p>
    <p id="combinations"></p>
    <p id="crack_time"></p>
</div>

{% endblock %}
